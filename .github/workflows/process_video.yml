name: Process Video

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      video_id:
        description: 'Google Drive video file ID (leave empty to auto-pick)'
        required: false
        type: string
      folder_id:
        description: 'Google Drive source folder ID (overrides env var)'
        required: false
        type: string

  # Auto-trigger: check every 3 days if queue needs refilling
  schedule:
    - cron: '0 0 */3 * *'  # Every 3 days at midnight UTC

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hour max for long videos
    permissions:
      contents: write   # needed to push queue/processed_videos updates back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Whisper model: cache locally so HuggingFace Hub is never hit at runtime ──
      - name: Cache Whisper model
        id: cache-whisper
        uses: actions/cache@v4
        with:
          path: models/faster-whisper-base
          # Bump the version suffix if you need to force a fresh download
          key: whisper-faster-base-v3

      - name: Download Whisper model (if not cached)
        if: steps.cache-whisper.outputs.cache-hit != 'true'
        run: |
          mkdir -p models/faster-whisper-base

          # The hf CLI handles XET blob storage, retries, and rate-limit back-off automatically,
          # unlike raw wget which fails with 429 on unauthenticated CDN requests.
          echo "Downloading Systran/faster-whisper-base via hf..."
          hf download \
            Systran/faster-whisper-base \
            --local-dir models/faster-whisper-base \
            --quiet

          echo "Model files ready:"
          ls -lh models/faster-whisper-base/

      - name: Validate Whisper model files
        run: |
          echo "Checking model files..."
          for f in config.json tokenizer.json vocabulary.txt; do
            if [ ! -f "models/faster-whisper-base/$f" ]; then
              echo "ERROR: Missing model file: $f"
              ls -la models/faster-whisper-base/ || true
              exit 1
            fi
          done
          # model.bin must be at least 140 MB
          MODEL_SIZE=$(stat -c%s "models/faster-whisper-base/model.bin" 2>/dev/null || echo 0)
          if [ "$MODEL_SIZE" -lt 140000000 ]; then
            echo "ERROR: model.bin is too small ($MODEL_SIZE bytes) — download likely failed"
            exit 1
          fi
          echo "All model files OK (model.bin: $(du -sh models/faster-whisper-base/model.bin | cut -f1))"

      - name: Verify Gemini API access
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os, sys
          from google import genai
          from google.genai import types as genai_types
          from pydantic import BaseModel

          key = os.environ.get("GEMINI_API_KEY", "")
          if not key:
              print("ERROR: GEMINI_API_KEY secret is not set.")
              sys.exit(1)

          client = genai.Client(api_key=key)

          # Test 1: Basic text generation
          try:
              resp = client.models.generate_content(
                  model="gemini-2.5-flash",
                  contents="Reply with the single word: ok",
                  config=genai_types.GenerateContentConfig(max_output_tokens=100),
              )
              print(f"Gemini 2.5-flash OK — response: {(resp.text or '').strip()!r}")
          except Exception as e:
              print(f"ERROR: Gemini 2.5-flash check failed: {e}")
              sys.exit(1)

          # Test 2: Structured output (the approach used by clip_selector.py)
          class TestOut(BaseModel):
              message: str
              ok: bool

          try:
              resp2 = client.models.generate_content(
                  model="gemini-2.5-flash",
                  contents="Return a JSON with message='hello' and ok=true",
                  config=genai_types.GenerateContentConfig(
                      response_mime_type="application/json",
                      response_schema=TestOut,
                      max_output_tokens=1024,
                  ),
              )
              parsed = resp2.parsed
              print(f"Structured output OK — parsed: {parsed}")
          except Exception as e:
              print(f"ERROR: Structured output check failed: {e}")
              sys.exit(1)
          EOF

      - name: Download Montserrat ExtraBold font
        run: |
          mkdir -p templates/fonts
          curl -L -o templates/fonts/Montserrat-ExtraBold.ttf \
            "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-ExtraBold.ttf"
          ls -la templates/fonts/

      - name: Check queue size
        id: check_queue
        run: |
          QUEUE_SIZE=$(python -c "
          import json
          try:
              data = json.load(open('data/queue.json'))
              pending = [c for c in data.get('clips', []) if c.get('status') == 'pending']
              print(len(pending))
          except:
              print(0)
          ")
          echo "queue_size=$QUEUE_SIZE" >> $GITHUB_OUTPUT
          echo "Current queue size: $QUEUE_SIZE"

      - name: Skip if queue is sufficient
        if: >
          github.event_name == 'schedule' &&
          steps.check_queue.outputs.queue_size >= 4
        run: |
          echo "Queue has ${{ steps.check_queue.outputs.queue_size }} pending clips. Skipping processing."
          exit 0

      - name: Process video
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DRIVE_SOURCE_FOLDER_ID: ${{ secrets.DRIVE_SOURCE_FOLDER_ID }}
          DRIVE_QUEUE_FOLDER_ID: ${{ secrets.DRIVE_QUEUE_FOLDER_ID }}
          # Use the locally downloaded model — bypasses HuggingFace API entirely
          WHISPER_MODEL: models/faster-whisper-base
          HF_HUB_OFFLINE: "1"
          # Cap transcription to first 45 min — enough to pick 10 clips, avoids CPU timeout
          WHISPER_MAX_MINUTES: "45"
        run: |
          python process_video.py \
            ${{ inputs.video_id && format('--video-id {0}', inputs.video_id) || '' }} \
            ${{ inputs.folder_id && format('--folder-id {0}', inputs.folder_id) || '' }}

      - name: Commit queue updates
        run: |
          git config user.name "YT Shorts Bot"
          git config user.email "bot@yt-shorts-automation.local"
          git add data/queue.json data/processed_videos.json
          git diff --staged --quiet || git commit -m "🤖 Processed video — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
